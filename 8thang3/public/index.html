<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pink: #ff758c; --purple: #764ba2; --bg: #fdf2f4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Admin UI */
        .admin-wrap { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 500px; margin: 0 auto; background: white; }
        .tabs { display: flex; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 10; background: white;}
        .tab-btn { flex: 1; padding: 15px; border: none; background: white; font-weight: bold; color: #999; font-size: 1.1rem; transition: 0.3s;}
        .tab-btn.active { color: var(--pink); border-bottom: 3px solid var(--pink); }
        .content { flex: 1; overflow-y: auto; padding: 15px; }

        /* Tivi UI & Animation */
        #tv-title { 
            color: var(--purple); font-size: clamp(1.5rem, 4vw, 3rem); 
            line-height: 1.3; margin-bottom: 40px; text-transform: uppercase;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; perspective: 1000px; }
        
        .cell { 
            background: white; padding: 25px 15px; border: 3px solid #eee; border-radius: 15px; 
            text-align: center; font-weight: bold; font-size: clamp(1rem, 2vw, 1.4rem); 
            display: flex; align-items: center; justify-content: center; min-height: 120px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; word-break: break-word; opacity: 0;
        }

        /* Animations */
        @keyframes popIn { 0% { opacity:0; transform:translateY(30px) scale(0.9); } 100% { opacity:1; transform:translateY(0) scale(1); } }
        .pop-in { animation: popIn 0.5s cubic-bezier(0.17, 0.88, 0.32, 1.2) forwards; }
        
        .cell.selected { border-color: orange; background: #fff8e5; transform: scale(1.05); box-shadow: 0 0 20px orange; opacity: 1; }
        
        @keyframes flipWin { 
            0% { transform: rotateY(0); } 
            50% { transform: rotateY(90deg) scale(1.1); background: #28a745; } 
            100% { transform: rotateY(0); background: #28a745; color: white; border-color: #28a745; box-shadow: 0 0 30px #28a745; } 
        }
        .cell.correct { animation: flipWin 0.6s ease-out forwards; opacity: 1; pointer-events: none; }

        @keyframes shakeErr { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .cell.wrong { animation: shakeErr 0.4s; background: #dc3545 !important; color: white; border-color: #dc3545; opacity: 1; }
        
        .cell.faded { opacity: 0.15 !important; filter: grayscale(1); transform: scale(0.9); pointer-events: none; }

        /* Admin Manage UI */
        .q-play-box { background: white; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        
        /* Box Câu hỏi: Nhấn giữ để kéo */
        .q-item { 
            background: white; border: 1px solid #eee; border-left: 5px solid var(--pink); 
            border-radius: 10px; margin: 10px 0; padding: 15px; display: flex; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); user-select: none;
        }
        .q-text { 
            flex: 1; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            cursor: pointer; padding-right: 10px; font-size: 1.1rem; color: #444;
        }
        .del-btn-outside { 
            border: none; background: none; font-size: 24px; color: #dc3545; 
            padding: 5px 0 5px 15px; cursor: pointer; 
        }

        .preset-dropdown { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 2px solid #eee; font-weight: bold; color: var(--purple); outline: none; background: #fdfdfd;}
        
        /* Modal phủ mờ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal { background: white; width: calc(100% - 40px); max-width: 450px; max-height: 90vh; border-radius: 20px; padding: 20px; overflow-y: auto; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="setup-screen" class="admin-wrap" style="justify-content: center; padding: 40px; box-sizing: border-box;">
        <h2 style="text-align:center; color: var(--purple);">8/3</h2>
        <input type="text" id="room-in" placeholder="Mã cổng" style="padding:15px; margin-bottom:12px; border-radius:8px; border:1px solid #ddd; font-weight:bold;">
        <input type="password" id="pass-in" placeholder="Mật khẩu Admin" style="padding:15px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="join('display')" style="background:var(--purple); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-bottom:12px;">📺 KẾT NỐI TIVI</button>
        <button onclick="join('host')" style="background:var(--pink); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold;">📱 ĐIỀU KHIỂN (ADMIN)</button>
    </div>

    <div id="host-screen" class="hidden admin-wrap">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ctrl')">ĐIỀU KHIỂN</button>
            <button class="tab-btn" onclick="switchTab('list')">QUẢN LÝ</button>
        </div>
        
        <div id="tab-ctrl" class="content">
            <div style="background:#fef0f2; padding:15px; border-radius:12px; text-align:center; border:2px dashed var(--pink); margin-bottom: 20px;">
                <p id="now-p" style="font-weight:bold; color:var(--purple); font-size: 1.1rem; margin-top:5px;">Chưa phát câu nào...</p>
                <div id="live-btns" class="hidden" style="display: flex; gap: 10px;">
                    <button onclick="send('check_choice')" style="flex:1; background:orange; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; box-shadow: 0 4px 0 #d35400;">🔍 KIỂM TRA</button>
                    <button onclick="send('reveal_correct')" style="flex:1; background:green; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; box-shadow: 0 4px 0 #1e7e34;">✨ ĐÁP ÁN</button>
                </div>
            </div>
            <div id="play-list"></div>
        </div>

        <div id="tab-list" class="content hidden">
            <button onclick="openModal()" style="width:100%; background:var(--purple); color:white; border:none; padding:18px; border-radius:25px; font-weight:bold; margin-bottom:20px; box-shadow: 0 4px 10px rgba(118,75,162,0.3); font-size:1.1rem;">+ SOẠN CÂU HỎI MỚI</button>
            <div id="sortable-area"></div>
        </div>
    </div>

    <div id="display-screen" class="hidden" style="padding:40px; text-align:center; min-height: 100vh;">
        <h1 id="tv-title">ĐANG ĐỢI CÂU HỎI...</h1>
        <div class="grid" id="tv-grid"></div>
    </div>

    <div id="modal-box" class="modal-overlay hidden">
        <div class="modal">
            <button onclick="closeModal()" style="position:absolute; right:15px; top:15px; border:none; background:none; font-size:26px; color:#555;">✖</button>
            <h3 id="m-title" style="color:var(--pink); margin-top:0; font-size: 1.3rem;">SOẠN THẢO</h3>
            <input type="hidden" id="edit-id">
            
            <textarea id="edit-text" placeholder="Nội dung câu hỏi..." style="width:100%; height:80px; padding:12px; border-radius:10px; border:1px solid #ccc; font-weight:bold; font-size:1rem; box-sizing:border-box; margin-bottom:15px;"></textarea>
            
            <div style="font-size: 0.95rem; font-weight: bold; color: var(--purple); margin-bottom: 10px;">1. Lựa chọn (Tích ô vuông nếu ĐÚNG):</div>
            <div id="opt-box" style="margin-bottom:15px;"></div>
            <button onclick="addOptRow()" style="width:100%; padding:12px; border:2px dashed #ccc; background:#fafafa; color:#666; font-weight:bold; border-radius:8px; margin-bottom:25px;">+ Thêm lựa chọn</button>
            
            <div style="font-size: 0.95rem; font-weight: bold; color: var(--purple); margin-bottom: 10px;">2. Kịch bản đánh lừa (Tùy chọn):</div>
            <div id="presets-box"></div>
            <button onclick="addPresetBox()" style="width:100%; padding:10px; border:1px solid var(--purple); background:white; color:var(--purple); font-weight:bold; border-radius:8px; margin-bottom:25px;">+ Thêm Kịch bản (VD: 4 đáp án đầu)</button>

            <button onclick="saveQ()" style="width:100%; background:var(--pink); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:1.1rem; box-shadow: 0 4px 10px rgba(255,117,140,0.4);">💾 LƯU VÀO MA TRẬN</button>
        </div>
    </div>

    <script>
        const socket = io(); let room = "", role = "", tvCorrects = [], adminPass = "";
        
        function fireResult(isCorrect) {
            if(!isCorrect) return;
            const duration = 3000, end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff758c', '#ffffff'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff758c', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        socket.on('error_msg', m => alert(m));
        function join(r) { room = document.getElementById('room-in').value.trim(); adminPass = document.getElementById('pass-in').value.trim(); socket.emit('join_room', {role: r, roomCode: room, password: adminPass}); }
        socket.on('join_success', d => { role = d.role; document.getElementById('setup-screen').classList.add('hidden'); document.getElementById(role+'-screen').classList.remove('hidden'); if(role==='host') load(); });

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t==='ctrl'?'ĐIỀU':'QUẢN')));
            document.getElementById('tab-ctrl').classList.toggle('hidden', t!=='ctrl');
            document.getElementById('tab-list').classList.toggle('hidden', t!=='list');
            if(t==='list') initSort();
        }

        async function load() {
            const res = await fetch('/api/questions'); const data = await res.json();
            const list = document.getElementById('sortable-area'); list.innerHTML = '';
            const play = document.getElementById('play-list'); play.innerHTML = '';
            
            data.forEach((q, i) => {
                // RENDER TAB QUẢN LÝ
                const item = document.createElement('div'); item.className = 'q-item'; item.dataset.id = q.id;
                // Bấm vào chữ thì sửa, bấm vào thùng rác thì xóa
                item.innerHTML = `
                    <div class="q-text" onclick='openModal(${JSON.stringify(q)})'>Câu ${i+1}: ${q.content}</div>
                    <button class="del-btn-outside" onclick="del(${q.id})">🗑️</button>
                `;
                list.appendChild(item);

                // RENDER TAB ĐIỀU KHIỂN
                const pb = document.createElement('div'); pb.className = 'q-play-box';
                let h = `<div style="font-weight:bold; color:#444; margin-bottom:10px; font-size:1.1rem;">Câu ${i+1}: ${q.content.substring(0,35)}...</div>`;
                h += `<select id="psel-${q.id}" class="preset-dropdown"><option value="ALL">▶ Phát tất cả đáp án</option>`;
                if(q.presets) q.presets.forEach((p, idx) => h += `<option value="${idx}">▶ Kịch bản: ${p.name}</option>`);
                h += `</select><button onclick='playTV(${JSON.stringify(q)})' style="width:100%; display:flex; justify-content:center; align-items:center; gap:8px; background:var(--purple); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; font-size:1rem;">📺 PHÁT LÊN TIVI</button>`;
                pb.innerHTML = h; play.appendChild(pb);
            });
        }

        function playTV(q) {
            const v = document.getElementById('psel-'+q.id).value;
            let indices = (v==="ALL") ? null : q.presets[parseInt(v)].indices;
            let preName = (v==="ALL") ? "Tất cả đáp án" : q.presets[parseInt(v)].name;
            document.getElementById('now-p').innerText = q.content.substring(0,25) + `... (${preName})`;
            document.getElementById('live-btns').classList.remove('hidden');
            socket.emit('send_command', {roomCode: room, type:'load', q, active_preset: indices});
        }

        function initSort() {
            new Sortable(document.getElementById('sortable-area'), {
                animation: 150, 
                delay: 200, // CHẠM GIỮ 0.2 GIÂY ĐỂ KÉO
                delayOnTouchOnly: true, // Chỉ áp dụng trên điện thoại
                filter: '.del-btn-outside', // BỎ QUA KHÔNG CHO KÉO NÚT XÓA
                onEnd: async () => {
                    const ids = Array.from(document.getElementById('sortable-area').children).map(i => i.dataset.id);
                    await fetch('/api/questions/reorder', {method:'POST', headers:{'Content-Type':'application/json', 'x-admin-pass': adminPass}, body:JSON.stringify({orderedIds: ids})});
                    load();
                }
            });
        }

        function openModal(q = null) {
            document.getElementById('modal-box').classList.remove('hidden');
            document.getElementById('opt-box').innerHTML = ''; document.getElementById('presets-box').innerHTML = '';
            if(q) {
                document.getElementById('m-title').innerText = "CHỈNH SỬA CÂU HỎI";
                document.getElementById('edit-id').value = q.id; document.getElementById('edit-text').value = q.content;
                q.options.forEach((o, i) => addOptRow(o, q.correct_indices.includes(i)));
                if(q.presets) q.presets.forEach(p => addPresetBox(p.name, p.indices));
            } else {
                document.getElementById('m-title').innerText = "SOẠN CÂU HỎI MỚI";
                document.getElementById('edit-id').value = ''; document.getElementById('edit-text').value = '';
                for(let i=0; i<4; i++) addOptRow();
            }
            refreshPresetsUI();
        }

        function addOptRow(v='', c=false) {
            const r = document.createElement('div'); r.style.display="flex"; r.style.alignItems="center"; r.style.gap="10px"; r.style.marginBottom="12px";
            r.innerHTML = `<input type="checkbox" style="width:22px; height:22px; accent-color:#28a745;" ${c?'checked':''}> <input type="text" style="flex:1; padding:12px; border-radius:6px; border:1px solid #ccc; font-weight:bold;" value="${v}" placeholder="Lựa chọn..." oninput="refreshPresetsUI()"> <button onclick="this.parentElement.remove(); refreshPresetsUI();" style="border:none; background:none; color:#dc3545; font-size:20px;">✖</button>`;
            document.getElementById('opt-box').appendChild(r); refreshPresetsUI();
        }

        function addPresetBox(n='', ci=[]) {
            const b = document.createElement('div'); b.style.background="#fdfdfd"; b.style.border="1px dashed var(--purple)"; b.style.padding="12px"; b.style.borderRadius="10px"; b.style.marginBottom="12px";
            b.innerHTML = `<div style="display:flex; gap:10px;"><input type="text" class="p-name" value="${n}" placeholder="Tên kịch bản" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:6px; font-weight:bold;"><button onclick="this.parentElement.parentElement.remove()" style="color:white; background:#dc3545; border:none; border-radius:6px; padding:0 15px; font-weight:bold;">Xóa</button></div><div class="p-opts" style="margin-top:10px; background:white; padding:10px; border-radius:6px; border:1px solid #eee;" data-checked='${JSON.stringify(ci)}'></div>`;
            document.getElementById('presets-box').appendChild(b); refreshPresetsUI();
        }

        function refreshPresetsUI() {
            const opts = Array.from(document.querySelectorAll('#opt-box input[type="text"]')).map(i => i.value || '(Trống)');
            document.querySelectorAll('#presets-box > div').forEach(box => {
                const container = box.querySelector('.p-opts');
                let saved = JSON.parse(container.getAttribute('data-checked') || "[]");
                const current = Array.from(container.querySelectorAll('input:checked')).map(c => parseInt(c.value));
                if(current.length > 0) saved = current;
                container.innerHTML = opts.map((t, i) => `<label style="display:block; font-size:14px; margin-bottom:8px; color:#444; font-weight:bold;"><input type="checkbox" style="width:18px; height:18px; vertical-align:middle; accent-color:#28a745;" value="${i}" ${saved.includes(i)?'checked':''} onchange="this.parentElement.parentElement.setAttribute('data-checked', JSON.stringify(Array.from(this.parentElement.parentElement.querySelectorAll('input:checked')).map(c=>parseInt(c.value))))"> ${t.substring(0,25)}</label>`).join('');
            });
        }

        async function saveQ() {
            const opts = [], idxs = [], presets = [];
            document.querySelectorAll('#opt-box > div').forEach((r, i) => {
                const v = r.querySelector('input[type="text"]').value;
                if(v) { opts.push(v); if(r.querySelector('input[type="checkbox"]').checked) idxs.push(opts.length-1); }
            });
            
            if(idxs.length === 0) return alert("Bạn phải tích chọn ít nhất 1 đáp án đúng!");

            let pErr = false;
            document.querySelectorAll('#presets-box > div').forEach(box => {
                const n = box.querySelector('.p-name').value.trim();
                const pIdxs = JSON.parse(box.querySelector('.p-opts').getAttribute('data-checked'));
                if(n && pIdxs.length > 0) presets.push({name: n, indices: pIdxs});
                else if(n || pIdxs.length > 0) pErr = true;
            });
            if(pErr) return alert("Lỗi Kịch bản: Nhập Tên kịch bản và Tích ít nhất 1 lựa chọn!");

            await fetch('/api/questions', {method:'POST', headers:{'Content-Type':'application/json', 'x-admin-pass': adminPass}, body:JSON.stringify({id: document.getElementById('edit-id').value, content: document.getElementById('edit-text').value, options: opts, correct_indices: idxs, presets})});
            closeModal(); load();
        }

        async function del(id) { 
            if(confirm("Bạn có chắc muốn xóa câu này?")) { 
                await fetch('/api/questions/'+id, {method:'DELETE', headers:{'x-admin-pass': adminPass}}); 
                load(); 
            } 
        }
        
        function closeModal() { document.getElementById('modal-box').classList.add('hidden'); }
        function send(s) { socket.emit('send_command', {roomCode: room, type: 'step', step: s}); }

        // Tivi Logic
        socket.on('update_ui', d => {
            if(role!=='display') return;
            if(d.type==='load') {
                const tt = document.getElementById('tv-title'); tt.innerText = d.q.content; 
                tt.style.fontSize = (d.q.content.length > 100) ? "1.8rem" : "clamp(1.5rem, 4vw, 3rem)";
                tvCorrects = d.q.correct_indices;
                const g = document.getElementById('tv-grid'); g.innerHTML = '';
                d.q.options.forEach((o, i) => {
                    if(d.active_preset && !d.active_preset.includes(i)) return; 
                    const c = document.createElement('div'); c.className = 'cell pop-in'; c.id = 'tv-'+i; c.innerText = o;
                    c.style.animationDelay = (g.children.length * 0.1) + 's';
                    c.onclick = () => { if(!c.classList.contains('correct') && !c.classList.contains('wrong') && !c.classList.contains('faded')) { document.querySelectorAll('.cell').forEach(x => x.classList.remove('selected')); c.classList.add('selected'); }};
                    g.appendChild(c);
                });
            }
            if(d.type==='step') {
                const s = document.querySelector('.cell.selected');
                if(d.step==='check_choice' && s) {
                    const i = parseInt(s.id.split('-')[1]);
                    const ok = tvCorrects.includes(i);
                    s.classList.remove('selected', 'pop-in'); s.style.animationDelay = '0s';
                    if(ok) { s.classList.add('correct'); fireResult(true); document.querySelectorAll('.cell').forEach(c => {if(c.id!==s.id) c.classList.add('faded');}); }
                    else { s.classList.add('wrong'); setTimeout(()=>s.classList.add('faded'), 500); }
                }
                if(d.step==='reveal_correct') {
                    document.querySelectorAll('.cell').forEach(c => {
                        c.classList.remove('selected', 'pop-in'); c.style.animationDelay = '0s';
                        if(tvCorrects.includes(parseInt(c.id.split('-')[1]))) c.classList.add('correct'); else c.classList.add('faded');
                    });
                    fireResult(true);
                }
            }
        });
    </script>
</body>
</html>
